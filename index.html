<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ECU Shop — Live HUD</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #080808;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: #222;
    --accent: #e85d04;
    --text: #f0f0f0;
    --muted: #555;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
    --purple: #a855f7;
    --orange: #f97316;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }

  /* HEADER */
  .hud-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    height: 72px;
  }

  .hud-brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .hud-logo {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: monospace;
    font-weight: 900;
    font-size: 14px;
    color: #fff;
    letter-spacing: -0.5px;
  }

  .hud-title {
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .hud-sub {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: monospace;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .hud-stats {
    display: flex;
    gap: 32px;
  }

  .hud-stat {
    text-align: center;
  }

  .hud-stat-num {
    font-size: 1.8rem;
    font-weight: 900;
    font-family: monospace;
    color: var(--accent);
    line-height: 1;
  }

  .hud-stat-label {
    font-size: 0.62rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-top: 2px;
  }

  .hud-clock {
    text-align: right;
  }

  .hud-time {
    font-size: 1.8rem;
    font-weight: 300;
    font-family: monospace;
    letter-spacing: 0.05em;
    line-height: 1;
  }

  .hud-date {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: monospace;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  /* MAIN GRID */
  .hud-main {
    padding: 20px 24px;
    height: calc(100vh - 72px);
    overflow-y: auto;
    scrollbar-width: none;
  }

  .hud-main::-webkit-scrollbar { display: none; }

  .order-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }

  /* ORDER CARD */
  .hud-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s;
  }

  .hud-card.new-order {
    animation: newOrderPulse 2s ease 3;
    border-color: var(--accent);
  }

  @keyframes newOrderPulse {
    0%, 100% { border-color: var(--border); box-shadow: none; }
    50% { border-color: var(--accent); box-shadow: 0 0 20px rgba(232,93,4,0.3); }
  }

  .hud-card-accent {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    border-radius: 10px 0 0 10px;
  }

  .hud-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }

  .hud-order-id {
    font-family: monospace;
    font-size: 1rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .hud-days {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: monospace;
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 4px;
  }

  .hud-days.overdue {
    color: var(--red);
    background: rgba(239,68,68,0.1);
  }

  .hud-customer {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 2px;
  }

  .hud-vehicle {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .hud-card-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .hud-status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .hud-status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .hud-status-dot.pulse {
    animation: dotPulse 1.5s infinite;
  }

  @keyframes dotPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .hud-ecu {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: monospace;
  }

  .hud-paid {
    font-size: 0.68rem;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 700;
  }

  .paid-yes { background: rgba(34,197,94,0.12); color: var(--green); }
  .paid-no { background: rgba(239,68,68,0.1); color: var(--red); }

  /* EMPTY */
  .hud-empty {
    text-align: center;
    padding: 80px 20px;
    color: var(--muted);
    font-size: 1rem;
    grid-column: 1 / -1;
  }

  .hud-empty .icon { font-size: 3rem; margin-bottom: 16px; }

  /* NEW ORDER ALERT BANNER */
  .alert-banner {
    position: fixed;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #fff;
    padding: 16px 40px;
    border-radius: 0 0 16px 16px;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    z-index: 999;
    transition: top 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    text-align: center;
    box-shadow: 0 8px 32px rgba(232,93,4,0.4);
    min-width: 400px;
  }

  .alert-banner.show { top: 0; }

  .alert-banner .alert-sub {
    font-size: 0.78rem;
    font-weight: 400;
    opacity: 0.85;
    margin-top: 2px;
    font-family: monospace;
    letter-spacing: 0.06em;
  }

  /* LIVE INDICATOR */
  .live-dot {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 0.68rem;
    color: var(--green);
    font-family: monospace;
    letter-spacing: 0.06em;
  }

  .live-dot::before {
    content: '';
    width: 7px;
    height: 7px;
    background: var(--green);
    border-radius: 50%;
    animation: livePulse 2s infinite;
  }

  @keyframes livePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* SECTION LABELS */
  .section-label {
    font-size: 0.65rem;
    font-family: monospace;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 12px;
    margin-top: 4px;
    padding-left: 2px;
  }
</style>
</head>
<body>

<!-- ALERT BANNER -->
<div class="alert-banner" id="alert-banner">
  <div id="alert-text">🔧 NEW ORDER RECEIVED</div>
  <div class="alert-sub" id="alert-sub">ECU-0000 · Customer Name</div>
</div>

<!-- HEADER -->
<div class="hud-header">
  <div class="hud-brand">
    <div class="hud-logo">ECU</div>
    <div>
      <div class="hud-title">Shop Dashboard</div>
      <div class="hud-sub"><span class="live-dot">LIVE</span></div>
    </div>
  </div>

  <div class="hud-stats">
    <div class="hud-stat">
      <div class="hud-stat-num" id="s-active">—</div>
      <div class="hud-stat-label">Active</div>
    </div>
    <div class="hud-stat">
      <div class="hud-stat-num" id="s-waiting">—</div>
      <div class="hud-stat-label">Waiting</div>
    </div>
    <div class="hud-stat">
      <div class="hud-stat-num" id="s-complete">—</div>
      <div class="hud-stat-label">Complete</div>
    </div>
    <div class="hud-stat">
      <div class="hud-stat-num" id="s-unpaid">—</div>
      <div class="hud-stat-label">Unpaid</div>
    </div>
  </div>

  <div class="hud-clock">
    <div class="hud-time" id="clock">00:00:00</div>
    <div class="hud-date" id="dateline"></div>
  </div>
</div>

<!-- MAIN -->
<div class="hud-main">
  <div class="section-label" id="grid-label">Active Orders</div>
  <div class="order-grid" id="order-grid">
    <div class="hud-empty"><div class="icon">📋</div><p>Loading orders...</p></div>
  </div>
</div>

<script>
// ============================================
// CONFIG
// ============================================
const SUPABASE_URL  = 'https://ltmakawhazxasgvkygso.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx0bWFrYXdoYXp4YXNndmt5Z3NvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTIxNzcsImV4cCI6MjA5Nzg2ODE3N30.hnxrm3p6e1vRCWkhZDk15OWs0Xr_bYidjK1wnbKFBNs';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);

let allOrders = [];
let knownOrderIds = new Set();
let pendingNewOrderIds = new Set(); // tracks orders that should pulse orange
let initialized = false;

// ============================================
// STATUS CONFIG
// ============================================
const STATUS = {
  'Label Sent':        { color: '#555',    bg: 'rgba(85,85,85,0.15)',       pulse: false },
  'Awaiting Shipment': { color: '#555',    bg: 'rgba(85,85,85,0.15)',       pulse: false },
  'In Transit':        { color: '#3b82f6', bg: 'rgba(59,130,246,0.12)',     pulse: true  },
  'Received':          { color: '#eab308', bg: 'rgba(234,179,8,0.12)',      pulse: true  },
  'Diagnosing':        { color: '#f97316', bg: 'rgba(249,115,22,0.12)',     pulse: true  },
  'Waiting on Parts':  { color: '#ef4444', bg: 'rgba(239,68,68,0.12)',      pulse: true  },
  'Parts Ordered':     { color: '#a855f7', bg: 'rgba(168,85,247,0.12)',     pulse: true  },
  'In Progress':       { color: '#e85d04', bg: 'rgba(232,93,4,0.12)',       pulse: true  },
  'Quality Check':     { color: '#eab308', bg: 'rgba(234,179,8,0.12)',      pulse: true  },
  'Complete':          { color: '#22c55e', bg: 'rgba(34,197,94,0.12)',      pulse: false },
  'Shipped':           { color: '#22c55e', bg: 'rgba(34,197,94,0.12)',      pulse: false },
  'On Hold':           { color: '#ef4444', bg: 'rgba(239,68,68,0.12)',      pulse: true  },
  'Returned':          { color: '#555',    bg: 'rgba(85,85,85,0.15)',       pulse: false },
};

// ============================================
// XSS SANITIZER
// ============================================
function s(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

const ACTIVE_STATUSES = ['Received','Diagnosing','Waiting on Parts','Parts Ordered','In Progress','Quality Check','On Hold','In Transit'];
const DONE_STATUSES   = ['Complete','Shipped'];

// ============================================
// CLOCK
// ============================================
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  document.getElementById('dateline').textContent =
    now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' }).toUpperCase();
}
setInterval(updateClock, 1000);
updateClock();

// ============================================
// AUDIO ALERT — single reusable AudioContext
// ============================================
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx || audioCtx.state === 'closed') {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playAlert() {
  try {
    const ctx = getAudioCtx();
    const notes = [523, 659, 784];
    notes.forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.setValueAtTime(0, ctx.currentTime + i * 0.15);
      gain.gain.linearRampToValueAtTime(0.3, ctx.currentTime + i * 0.15 + 0.05);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + i * 0.15 + 0.3);
      osc.start(ctx.currentTime + i * 0.15);
      osc.stop(ctx.currentTime + i * 0.15 + 0.35);
    });
  } catch(e) {}
}

// ============================================
// BANNER ALERT
// ============================================
function showAlert(order) {
  const banner = document.getElementById('alert-banner');
  document.getElementById('alert-text').textContent = `🔧 NEW ORDER: ${order.order_id}`;
  document.getElementById('alert-sub').textContent =
    `${order.customer_name} · ${order.year || ''} ${order.make || ''} ${order.model || ''} · ${order.service_type || ''}`;
  banner.classList.add('show');
  playAlert();
  setTimeout(() => banner.classList.remove('show'), 6000);
}

// ============================================
// LOAD ORDERS
// ============================================
async function loadOrders() {
  const { data, error } = await db
    .from('orders')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) return;

  if (!initialized) {
    data.forEach(o => knownOrderIds.add(o.order_id));
    initialized = true;
  }

  allOrders = data || [];
  updateStats();
  renderGrid();
}

function updateStats() {
  const active   = allOrders.filter(o => ACTIVE_STATUSES.includes(o.status)).length;
  const waiting  = allOrders.filter(o => o.status === 'Waiting on Parts').length;
  const complete = allOrders.filter(o => DONE_STATUSES.includes(o.status)).length;
  const unpaid   = allOrders.filter(o => !o.paid && DONE_STATUSES.includes(o.status)).length;

  document.getElementById('s-active').textContent   = active;
  document.getElementById('s-waiting').textContent  = waiting;
  document.getElementById('s-complete').textContent = complete;
  document.getElementById('s-unpaid').textContent   = unpaid;
}

function daysSince(dateStr) {
  const days = Math.floor((Date.now() - new Date(dateStr)) / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return '1 day ago';
  return `${days} days`;
}

function renderGrid() {
  // show active orders first, then completed
  const active   = allOrders.filter(o => ACTIVE_STATUSES.includes(o.status));
  const done     = allOrders.filter(o => DONE_STATUSES.includes(o.status)).slice(0, 6);
  const pending  = allOrders.filter(o => ['Label Sent','Awaiting Shipment'].includes(o.status));
  const display  = [...active, ...pending, ...done];

  const label = `${active.length} Active · ${pending.length} Pending · ${done.length} Recent`;
  document.getElementById('grid-label').textContent = label;

  if (display.length === 0) {
    document.getElementById('order-grid').innerHTML =
      `<div class="hud-empty"><div class="icon">✓</div><p>No active orders</p></div>`;
    return;
  }

  document.getElementById('order-grid').innerHTML = display.map(o => {
    const cfg = STATUS[o.status] || { color: '#555', bg: 'rgba(85,85,85,0.15)', pulse: false };
    const days = daysSince(o.created_at);
    const daysNum = Math.floor((Date.now() - new Date(o.created_at)) / 86400000);
    const overdue = daysNum > 7 && !DONE_STATUSES.includes(o.status);
    const isNew = pendingNewOrderIds.has(o.order_id);

    return `
      <div class="hud-card ${isNew ? 'new-order' : ''}">
        <div class="hud-card-accent" style="background:${cfg.color}"></div>
        <div style="padding-left:8px">
          <div class="hud-card-top">
            <div class="hud-order-id">${s(o.order_id)}</div>
            <div class="hud-days ${overdue ? 'overdue' : ''}">${days}</div>
          </div>
          <div class="hud-customer">${s(o.customer_name)}</div>
          <div class="hud-vehicle">${s(o.year)} ${s(o.make)} ${s(o.model)}</div>
          <div class="hud-card-bottom">
            <div class="hud-status" style="background:${cfg.bg};color:${cfg.color}">
              <div class="hud-status-dot ${cfg.pulse ? 'pulse' : ''}" style="background:${cfg.color}"></div>
              ${s(o.status)}
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <div class="hud-ecu">${s(o.ecu_part)}</div>
              <div class="hud-paid ${o.paid ? 'paid-yes' : 'paid-no'}">${o.paid ? '✓ Paid' : 'Unpaid'}</div>
            </div>
          </div>
          ${o.parts_needed ? `<div style="margin-top:8px;font-size:0.72rem;color:#a855f7;font-family:monospace;padding-top:8px;border-top:1px solid #222">⚙ ${s(o.parts_needed)}</div>` : ''}
          ${o.notes && ACTIVE_STATUSES.includes(o.status) ? `<div style="margin-top:6px;font-size:0.72rem;color:var(--muted);font-family:monospace">${s(o.notes)}</div>` : ''}
        </div>
      </div>
    `;
  }).join('');
  // clear pending new orders after rendering so pulse only shows once
  pendingNewOrderIds.clear();
}

// ============================================
// REALTIME — NEW ORDERS + UPDATES
// ============================================
db.channel('hud-orders')
  .on('postgres_changes', {
    event: 'INSERT',
    schema: 'public',
    table: 'orders'
  }, payload => {
    const newOrder = payload.new;
    if (!knownOrderIds.has(newOrder.order_id)) {
      knownOrderIds.add(newOrder.order_id);
      pendingNewOrderIds.add(newOrder.order_id); // mark for pulse animation
      showAlert(newOrder);
      loadOrders();
    }
  })
  .on('postgres_changes', {
    event: 'UPDATE',
    schema: 'public',
    table: 'orders'
  }, () => {
    loadOrders();
  })
  .subscribe();

// ============================================
// INIT + AUTO REFRESH every 60s as fallback
// ============================================
loadOrders();
setInterval(loadOrders, 60000);
</script>
</body>
</html>
